<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Support Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-wrapper { width: 420px; background: white; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; height: 600px; }
    .chat-header { background: #4f46e5; color: white; padding: 18px 20px; font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .chat-header .dot { width: 10px; height: 10px; background: #86efac; border-radius: 50%; }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .message.bot { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.user { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.typing { color: #94a3b8; font-style: italic; }
    .chat-input { display: flex; padding: 14px; border-top: 1px solid #e2e8f0; gap: 10px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 24px; outline: none; font-size: 14px; }
    .chat-input input:focus { border-color: #4f46e5; }
    .chat-input button { background: #4f46e5; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .chat-input button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="dot"></div>
      Shop Support Assistant
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">👋 Hi! I'm your shop support assistant. How can I help you today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const messages = document.getElementById('messages');
      const text = input.value.trim();
      if (!text) return;

      // User message
      messages.innerHTML += `<div class="message user">${escapeHtml(text)}</div>`;
      input.value = '';
      messages.scrollTop = messages.scrollHeight;

      // Typing indicator
      const typingId = 'typing-' + Date.now();
      messages.innerHTML += `<div class="message bot typing" id="${typingId}">Typing...</div>`;
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        document.getElementById(typingId).remove();
        messages.innerHTML += `<div class="message bot">${escapeHtml(data.reply)}</div>`;
      } catch (e) {
        document.getElementById(typingId).remove();
        messages.innerHTML += `<div class="message bot">Sorry, something went wrong. Please try again.</div>`;
      }
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
